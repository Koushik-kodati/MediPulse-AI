<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediPulse AI | Intelligent Triage</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --bg: #050507; 
            --card-bg: #0d0d0f; 
            --primary: #00f2ff;
            --secondary: #7000ff;
            --success: #00ff88;
            --warning: #ffaa00;
            --danger: #ff0055;
            --text: #e2e8f0;
            --border: rgba(255, 255, 255, 0.08);
            --glow: rgba(0, 242, 255, 0.15);
        }

        body.theme-safe { --bg: #020a05; --primary: #00ff88; --glow: rgba(0, 255, 136, 0.15); }
        body.theme-alert { --bg: #0a0202; --primary: #ff0044; --glow: rgba(255, 0, 68, 0.2); }
        body.theme-moderate { --bg: #0a0802; --primary: #ffaa00; --glow: rgba(255, 170, 0, 0.15); }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text);
            transition: all 0.8s ease;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Interactive Glow Transitions */
        .identity-card, .demo-window, .info-box, .tray-card, .hospital-card, .run-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .navbar {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky; top: 0; z-index: 1000;
            background: rgba(5, 7, 10, 0.9);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
        }

        .logo { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .logo i { font-size: 1.8rem; color: var(--primary); text-shadow: 0 0 10px var(--primary); transition: 0.3s; }
        .logo:hover i { transform: scale(1.1); filter: brightness(1.2); }
        .logo-text { font-weight: 800; font-size: 1.6rem; letter-spacing: -1px; }
        .logo-text span { color: var(--primary); }

        .biometric-right { display: flex; align-items: center; gap: 20px; }
        .ekg-container { width: 100px; height: 30px; overflow: hidden; position: relative; }
        .ekg-svg { width: 200%; height: 100%; animation: moveEkg 2s linear infinite; }
        .ekg-path { stroke: var(--primary); stroke-width: 2; fill: none; }

        @keyframes moveEkg { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        .live-heart-box { display: flex; align-items: center; gap: 8px; }
        .bpm-counter { color: var(--primary); font-weight: 800; font-size: 1rem; min-width: 60px; }
        .live-heart { color: var(--danger); font-size: 1.4rem; animation: heartbeat 1.2s ease-in-out infinite; }

        @keyframes heartbeat { 0%, 30%, 60% { transform: scale(1); } 15% { transform: scale(1.3); } 45% { transform: scale(1.15); } }

        .container { width: 100%; max-width: 1000px; margin: 40px auto; padding: 0 20px; flex: 1; }

        .identity-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            padding: 20px; border-radius: 20px; margin-bottom: 30px;
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
        }
        .identity-card:hover {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.05);
        }

        .identity-card input {
            background: #000; border: 1px solid var(--border);
            padding: 15px 25px; border-radius: 30px; color: white; outline: none;
            transition: 0.3s;
        }
        .identity-card input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--glow);
        }

        .demo-window {
            background: var(--card-bg);
            border-radius: 35px; border: 1px solid var(--border);
            padding: 40px; box-shadow: 0 40px 100px rgba(0,0,0,0.6);
            position: relative; overflow: hidden;
        }
        .demo-window:hover { border-color: rgba(255,255,255,0.15); }

        textarea {
            width: 100%; height: 120px; background: rgba(0,0,0,0.4);
            border: 1px solid var(--border); border-radius: 20px;
            padding: 20px; color: white; font-size: 1rem; outline: none; resize: none; margin-bottom: 15px;
            transition: 0.3s;
        }
        textarea:focus { border-color: var(--primary); background: rgba(0,0,0,0.6); }

        .run-btn { 
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: #000; border: none; padding: 14px 35px; border-radius: 50px;
            font-weight: 800; cursor: pointer; display: inline-flex; align-items: center; gap: 10px;
        }
        .run-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.3);
            filter: brightness(1.1);
        }

        #resultPanel {
            margin-top: 30px; padding-top: 30px; border-top: 1px solid var(--border);
            display: none; animation: slideUp 0.5s ease forwards;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .severity-badge {
            display: inline-block; padding: 6px 18px; border-radius: 50px;
            font-weight: 800; font-size: 0.75rem; margin-bottom: 15px; color: #000;
        }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .info-box { padding: 20px; background: rgba(255,255,255,0.03); border-radius: 15px; border: 1px solid var(--border); }
        .info-box:hover { border-color: var(--primary); background: rgba(255,255,255,0.05); }
        .info-box h4 { font-size: 0.8rem; color: var(--primary); margin-bottom: 10px; }

        /* Hospital Section */
        #hospitalSection { margin-top: 30px; }
        .map-layout {
            display: flex; background: #08080a; border-radius: 25px;
            overflow: hidden; border: 1px solid var(--border); height: 450px;
        }
        #map { flex: 2; filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }
        .facility-sidebar { flex: 1; border-left: 1px solid var(--border); overflow-y: auto; background: #0d0d0f; }
        
        .hospital-card { padding: 20px; border-bottom: 1px solid var(--border); cursor: pointer; }
        .hospital-card:hover { background: rgba(0, 242, 255, 0.08); border-left: 4px solid var(--primary); }
        .hospital-card h4 { font-size: 0.9rem; color: white; margin-bottom: 5px; }
        .hospital-card .meta { font-size: 0.75rem; color: #64748b; }
        .status-badge { margin-top: 10px; font-size: 0.7rem; font-weight: 800; color: var(--primary); }

        .tray { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 40px; }
        .tray-card { 
            background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            border-radius: 22px; padding: 25px; text-align: center; font-size: 0.85rem; cursor: pointer;
        }
        .tray-card:hover {
            background: rgba(0, 242, 255, 0.08);
            border-color: var(--primary);
            transform: translateY(-5px);
            color: var(--primary);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .tray-card i { display: block; font-size: 1.5rem; margin-bottom: 10px; transition: 0.3s; }
        .tray-card:hover i { filter: drop-shadow(0 0 8px var(--primary)); }

        footer { text-align: center; font-size: 0.75rem; color: #64748b; padding: 40px; }

        @media (max-width: 768px) { 
            .identity-card, .info-grid, .tray { grid-template-columns: 1fr; } 
            .map-layout { flex-direction: column; height: auto; }
            #map { height: 300px; }
        }
    </style>
</head>
<body id="mainBody">

    <nav class="navbar">
        <div class="logo"><i class="fas fa-heart-pulse"></i><div class="logo-text">MediPulse <span>AI</span></div></div>
        <div class="biometric-right">
            <div class="ekg-container">
                <svg class="ekg-svg" viewBox="0 0 200 40">
                    <path class="ekg-path" d="M0,20 L20,20 L25,10 L30,30 L35,20 L60,20 L65,5 L70,35 L75,20 L100,20 L120,20 L125,10 L130,30 L135,20 L160,20 L165,5 L170,35 L175,20 L200,20" />
                </svg>
            </div>
            <div class="live-heart-box">
                <div class="bpm-counter">BPM <span id="bpmValue">72</span></div>
                <i class="fas fa-heart live-heart"></i>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="identity-card">
            <input type="text" id="userName" placeholder="Full Name">
            <input type="email" id="userEmail" placeholder="Email for Alerts">
        </div>

        <div class="demo-window">
            <div style="margin-bottom: 20px; font-weight: 600; letter-spacing: 1px;">
                <i class="fas fa-brain" style="color: var(--primary);"></i> FlashCheck AI
            </div>
            <textarea id="symptomsInput" placeholder="Describe symptoms in detail (e.g., 'Sharp chest pain for 2 hours, radiating to left arm')..."></textarea>
            <button class="run-btn" id="runBtn" onclick="runAnalysis()">Run AI Analysis <i class="fas fa-microchip"></i></button>

            <div id="resultPanel">
                <div id="sevBadge" class="severity-badge"></div>
                <h2 id="resultTitle" style="margin-bottom: 10px;"></h2>
                <p id="resultMsg" style="color: #94a3b8; line-height: 1.6;"></p>
                <div class="info-grid">
                    <div class="info-box"><h4><i class="fas fa-search"></i> Possible Causes</h4><div id="causeText"></div></div>
                    <div class="info-box"><h4><i class="fas fa-pills"></i> Care Suggestions</h4><div id="medText"></div></div>
                </div>
            </div>
          
            <div id="hospitalSection" style="display: none;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; margin-top: 30px;">
                    <h3 style="font-size: 0.8rem; letter-spacing: 2px; color: white; text-transform: uppercase;">Nearest Emergency Facilities</h3>
                    <span style="color: var(--primary); font-size: 0.7rem;"><i class="fas fa-circle" style="font-size: 0.4rem; margin-right: 5px;"></i> LIVE GPS ACTIVE</span>
                </div>

                <div class="map-layout">
                    <div id="map"></div>
                    <div id="facilityList" class="facility-sidebar">
                        <div style="padding: 15px; font-size: 0.7rem; color: #64748b; letter-spacing: 1px; border-bottom: 1px solid var(--border);">FOUND FACILITIES</div>
                        <div id="listItems">
                            <div style="padding: 20px; color: #475569; font-size: 0.8rem;">Click 'Hospitals' to search...</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="tray">
                <div class="tray-card"><i class="fas fa-clock"></i>Reminders</div>
                <div class="tray-card"><i class="fas fa-user-check"></i>Check-in</div>
                <div class="tray-card" id="hospitalsBtn" onclick="locateHospitals()">
                    <i class="fas fa-hospital"></i>Hospitals
                </div>
                <div class="tray-card" style="color: var(--danger);"><i class="fas fa-shield-virus"></i>SOS</div>
            </div>
        </div>
    </div>

    <footer>⚠ MediPulse AI . Institutional Demonstration Only . 2026</footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // Update UI Theme based on Severity
        function updateTheme(severity) {
            const body = document.getElementById('mainBody');
            body.classList.remove('theme-alert', 'theme-safe', 'theme-moderate');
            if (severity === 'Critical') body.classList.add('theme-alert');
            else if (severity === 'Moderate') body.classList.add('theme-moderate');
            else body.classList.add('theme-safe');
        }

        // Simulate AI Analysis
        async function runAnalysis() {
            const symptoms = document.getElementById('symptomsInput').value;
            const btn = document.getElementById('runBtn');
            const panel = document.getElementById('resultPanel');

            if (!symptoms) return alert("Please describe your symptoms.");

            btn.innerHTML = "Analyzing Neural Patterns... <i class='fas fa-spinner fa-spin'></i>";
            btn.disabled = true;

            // Simulated AI Logic (Replace with actual API fetch)
            setTimeout(() => {
                const isEmergency = symptoms.toLowerCase().includes('chest') || symptoms.toLowerCase().includes('breath');
                const data = {
                    severity: isEmergency ? 'Critical' : 'Moderate',
                    title: isEmergency ? "Emergency Protocol Suggested" : "Mild Symptom Detection",
                    message: isEmergency ? "Our AI detected patterns consistent with acute cardiac distress. Please remain calm." : "Symptoms appear non-life-threatening but require monitoring.",
                    causes: isEmergency ? "Cardiac stress, Respiratory obstruction" : "Muscle strain, Seasonal viral load",
                    meds: isEmergency ? "Seek immediate ER care. Do not drive." : "Rest, hydration, and OTC analgesics."
                };

                panel.style.display = "block";
                document.getElementById('sevBadge').innerText = data.severity;
                document.getElementById('sevBadge').style.background = 
                    data.severity === 'Critical' ? '#ff0044' : (data.severity === 'Moderate' ? '#ffaa00' : '#00ff88');
                
                document.getElementById('resultTitle').innerText = data.title;
                document.getElementById('resultMsg').innerText = data.message;
                document.getElementById('causeText').innerText = data.causes;
                document.getElementById('medText').innerText = data.meds;

                updateTheme(data.severity);
                btn.innerHTML = "Run AI Analysis <i class='fas fa-microchip'></i>";
                btn.disabled = false;
                panel.scrollIntoView({ behavior: 'smooth' });
            }, 1500);
        }

        // Live Heartbeat Simulation
        setInterval(() => {
            const bpm = Math.floor(Math.random() * (78 - 65 + 1) + 65);
            document.getElementById('bpmValue').innerText = bpm;
        }, 2000);

        // Hospital Locator Logic
        let map;
        function locateHospitals() {
            const section = document.getElementById('hospitalSection');
            const listItems = document.getElementById('listItems');
            section.style.display = "block";
            section.scrollIntoView({ behavior: 'smooth' });

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;

                    if (!map) {
                        map = L.map('map', { zoomControl: false }).setView([lat, lng], 14);
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                    } else {
                        map.setView([lat, lng], 14);
                    }

                    // Simulated Hospital Data (Overpass API alternative for local testing)
                    listItems.innerHTML = `<div style="padding:20px; color:var(--primary); font-size:0.8rem;"><i class="fas fa-spinner fa-spin"></i> Scanning Grid...</div>`;
                    
                    const query = `[out:json];node["amenity"="hospital"](around:5000,${lat},${lng});out;`;
                    const url = "https://overpass-api.de/api/interpreter?data=" + encodeURIComponent(query);

                    fetch(url)
                        .then(res => res.json())
                        .then(data => {
                            listItems.innerHTML = ""; 
                            if (data.elements.length === 0) {
                                listItems.innerHTML = `<div style="padding:20px; color:#64748b;">No facilities found nearby.</div>`;
                            }
                            data.elements.forEach(hospital => {
                                const name = hospital.tags.name || "General Hospital";
                                L.marker([hospital.lat, hospital.lon]).addTo(map).bindPopup(name);

                                const card = document.createElement('div');
                                card.className = 'hospital-card';
                                card.innerHTML = `
                                    <h4>${name}</h4>
                                    <div class="meta">Distance: ~${(Math.random() * 5).toFixed(1)} km</div>
                                    <div class="status-badge">AVAILABLE</div>
                                `;
                                card.onclick = () => map.setView([hospital.lat, hospital.lon], 16);
                                listItems.appendChild(card);
                            });
                        })
                        .catch(() => {
                            listItems.innerHTML = `<div style="padding:20px; color:var(--danger);">API limit reached. Please try again.</div>`;
                        });
                }, (err) => {
                    alert("Please enable location services.");
                });
            }
        }
    </script>
</body>
</html>
